<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本語 N3 Study Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --accent: #8b1a1a; --paper: #F7F3E8; --aged: #ede8d8; --border: #d8ccb4;
  --ink: #1a1209; --soft: #5a4e3c; --muted: #9a8e7c; --purple: #5a2a8a; --green: #3a7a5a;
  --wk-blue: #1c45f5;
}
html, body { height: 100%; font-family: 'Noto Sans JP', sans-serif; background: var(--paper); color: var(--ink); }
.topbar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: var(--aged); border-bottom: 1px solid var(--border); display: flex; align-items: stretch; height: 52px; padding: 0 1.25rem; gap: 0; }
.brand { display: flex; flex-direction: column; justify-content: center; padding-right: 1.25rem; border-right: 1px solid var(--border); margin-right: 1rem; flex-shrink: 0; }
.brand-name { font-family: 'DM Serif Display', serif; font-size: 1.1rem; color: var(--accent); }
.brand-sub  { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; margin-top: 1px; }
.tabs { display: flex; align-items: stretch; flex: 1; }
.tab { display: flex; align-items: center; gap: 7px; padding: 0 1.1rem; font-size: 12px; color: var(--soft); cursor: pointer; background: none; border: none; border-bottom: 2px solid transparent; font-family: 'Noto Sans JP', sans-serif; transition: color .15s, border-color .15s, background .15s; white-space: nowrap; }
.tab:hover { color: var(--ink); background: rgba(139,109,65,.06); }
.tab.active { color: var(--ink); border-bottom-color: var(--accent); font-weight: 500; }
.tab.active.wk { border-bottom-color: var(--purple); }
.tab.active.pl { border-bottom-color: var(--green); }
.dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.wk-widget { display: flex; align-items: center; gap: 8px; padding: 0 0 0 1rem; border-left: 1px solid var(--border); flex-shrink: 0; }
.wk-level-badge { display: flex; align-items: center; gap: 5px; background: var(--wk-blue); color: #fff; border-radius: 4px; padding: 3px 9px; font-size: 11px; font-family: 'DM Serif Display', serif; white-space: nowrap; cursor: default; }
.wk-level-badge .lbl { font-size: 8px; font-family: 'Noto Sans JP', sans-serif; opacity: .8; text-transform: uppercase; letter-spacing: .07em; }
.wk-level-badge .lvl { font-size: 15px; line-height: 1; }
.wk-level-badge.loading { background: var(--border); color: var(--soft); }
.wk-level-badge.error   { background: #c05a5a; }
.wk-token-btn { font-size: 10px; color: var(--muted); background: none; border: 1px solid var(--border); border-radius: 3px; padding: 3px 8px; cursor: pointer; white-space: nowrap; font-family: 'Noto Sans JP', sans-serif; transition: background .15s, color .15s; }
.wk-token-btn:hover { background: var(--border); color: var(--ink); }
.wk-popover { position: fixed; top: 60px; right: 1.25rem; z-index: 200; background: var(--aged); border: 1px solid var(--border); border-radius: 6px; padding: 1rem 1.1rem; width: 320px; box-shadow: 0 4px 20px rgba(0,0,0,.12); display: none; }
.wk-popover.open { display: block; }
.wk-popover-title { font-size: 11px; font-weight: 600; color: var(--ink); margin-bottom: 4px; }
.wk-popover-sub { font-size: 10px; color: var(--muted); margin-bottom: 10px; line-height: 1.5; }
.wk-popover-sub a { color: var(--wk-blue); }
.wk-input { width: 100%; padding: 6px 8px; border: 1px solid var(--border); border-radius: 4px; background: #fff9ef; font-family: monospace; font-size: 11px; color: var(--ink); outline: none; margin-bottom: 8px; }
.wk-input:focus { border-color: var(--wk-blue); }
.wk-popover-btns { display: flex; gap: 6px; }
.wk-save-btn { flex: 1; padding: 6px; background: var(--wk-blue); color: #fff; border: none; border-radius: 4px; font-size: 11px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; transition: opacity .15s; }
.wk-save-btn:hover { opacity: .88; }
.wk-clear-btn { padding: 6px 10px; background: var(--aged); color: var(--soft); border: 1px solid var(--border); border-radius: 4px; font-size: 11px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; }
.panels { position: fixed; top: 52px; left: 0; right: 0; bottom: 0; overflow: hidden; }
.panel { position: absolute; inset: 0; overflow-y: auto; opacity: 0; pointer-events: none; transition: opacity .18s; }
.panel.active { opacity: 1; pointer-events: auto; }
.loader { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--paper); font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; transition: opacity .3s; z-index: 10; }
.loader.done { opacity: 0; pointer-events: none; }

/* ── Mobile-responsive nav ────────────────────────────────────────── */
@media (max-width: 700px) {
  .topbar { padding: 0 0.75rem; gap: 0; }

  /* Brand: compact, drop subtitle */
  .brand { padding-right: 0.75rem; margin-right: 0.5rem; }
  .brand-name { font-size: 0.95rem; }
  .brand-sub { display: none; }

  /* Tabs: horizontally scrollable, hide scrollbar */
  .tabs {
    overflow-x: auto;
    overflow-y: hidden;
    scrollbar-width: none;  /* Firefox */
    -ms-overflow-style: none;  /* IE/Edge */
    -webkit-overflow-scrolling: touch;
    min-width: 0;  /* allow flex item to shrink below content size */
  }
  .tabs::-webkit-scrollbar { display: none; }  /* Chrome/Safari */
  .tab { padding: 0 0.85rem; font-size: 11.5px; gap: 6px; }

  /* WK widget: keep badge, hide API token button */
  .wk-widget { padding-left: 0.5rem; gap: 0; }
  .wk-token-btn { display: none; }
  .wk-level-badge { padding: 3px 7px; }

  /* Popover: full-ish width on mobile if it ever opens (won't normally — button is hidden) */
  .wk-popover { left: 0.75rem; right: 0.75rem; width: auto; }
}

/* Extra-tight nav for very small phones */
@media (max-width: 380px) {
  .brand { padding-right: 0.5rem; margin-right: 0.4rem; border-right: none; }
  .brand-name { font-size: 0.85rem; }
  .tab { padding: 0 0.7rem; font-size: 11px; }
  .dot { width: 6px; height: 6px; }
}
</style>
</head>
<body>
<nav class="topbar">
  <div class="brand">
    <div class="brand-name">日本語 Study Hub</div>
    <div class="brand-sub">N3 · December 6, 2026</div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="show(0)"><span class="dot" style="background:#8b1a1a"></span>N3 Study Plan</button>
    <button class="tab pl"     onclick="show(1)"><span class="dot" style="background:#3a7a5a"></span>Planner Guide</button>
    <button class="tab wk"     onclick="show(2)"><span class="dot" style="background:#5a2a8a"></span>WK × Quartet</button>
    <button class="tab wk"     onclick="show(3)"><span class="dot" style="background:#5a2a8a"></span>WK × JLPT</button>
  </div>
  <div class="wk-widget">
    <div class="wk-level-badge loading" id="wk-badge"><span class="lbl">WK</span><span class="lvl" id="wk-lvl-display">—</span></div>
    <button class="wk-token-btn" id="wk-token-btn" onclick="toggleTokenPopover()">API token</button>
  </div>
</nav>
<div class="wk-popover" id="wk-popover">
  <div class="wk-popover-title">WaniKani API Token</div>
  <div class="wk-popover-sub">Generate a read-only token at <a href="https://www.wanikani.com/settings/personal_access_tokens" target="_blank">wanikani.com/settings/personal_access_tokens</a>. Your token is stored only in your browser’s localStorage and sent only to the WaniKani API.</div>
  <input class="wk-input" id="wk-input" type="password" placeholder="Paste your API token here…" autocomplete="off">
  <div class="wk-popover-btns">
    <button class="wk-save-btn" onclick="saveToken()">Save &amp; Fetch Level</button>
    <button class="wk-clear-btn" onclick="clearToken()">Clear</button>
  </div>
</div>
<div class="panels">
  <div class="panel active" id="p0"><div class="loader" id="l0">Loading…</div><div id="h0"></div></div>
  <div class="panel"        id="p1"><div class="loader" id="l1">Loading…</div><div id="h1"></div></div>
  <div class="panel"        id="p2"><div class="loader" id="l2">Loading…</div><div id="h2"></div></div>
  <div class="panel"        id="p3"><div class="loader" id="l3">Loading…</div><div id="h3"></div></div>
</div>
<script>
const QUARTET_CUM = {"1": 0, "2": 2, "3": 2, "4": 6, "5": 9, "6": 12, "7": 18, "8": 27, "9": 41, "10": 49, "11": 60, "12": 77, "13": 86, "14": 98, "15": 106, "16": 116, "17": 123, "18": 128, "19": 136, "20": 143, "21": 148, "22": 159, "23": 169, "24": 176, "25": 184, "26": 187, "27": 192, "28": 194, "29": 196, "30": 197, "31": 202, "32": 211, "33": 217, "34": 221, "35": 227, "36": 234, "37": 236, "38": 239, "39": 240, "40": 242, "41": 244, "42": 246, "43": 246, "44": 246, "45": 247, "46": 249, "47": 249, "48": 249, "49": 250, "50": 250, "51": 251, "52": 251, "53": 252, "54": 252, "55": 252, "56": 252, "57": 252, "58": 252, "59": 252, "60": 252};
const docs = [
  { style: "\n  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n\n  .doc-root {\n    font-family: 'Noto Sans JP', sans-serif;\n    background: #F7F3E8;\n    background-image:\n      linear-gradient(rgba(139,109,65,0.10) 1px, transparent 1px),\n      linear-gradient(90deg, rgba(139,109,65,0.10) 1px, transparent 1px);\n    background-size: 24px 24px;\n    color: #1a1209;\n    min-height: 100vh;\n    padding: 3rem 1.5rem 4rem;\n  }\n\n  .container {\n    max-width: 900px;\n    margin: 0 auto;\n  }\n\n  /* \u2500\u2500 Header \u2500\u2500 */\n  header {\n    margin-bottom: 2.5rem;\n    border-bottom: 1px solid #d8ccb4;\n    padding-bottom: 1.5rem;\n  }\n  .header-top {\n    display: flex;\n    align-items: baseline;\n    gap: 1rem;\n    flex-wrap: wrap;\n  }\n  h1 {\n    font-family: 'DM Serif Display', serif;\n    font-size: 2rem;\n    font-weight: 400;\n    color: #8b1a1a;\n    letter-spacing: .02em;\n    line-height: 1.1;\n  }\n  .header-badge {\n    font-size: 11px;\n    text-transform: uppercase;\n    letter-spacing: .1em;\n    color: #9a8e7c;\n    border: 1px solid #d8ccb4;\n    border-radius: 4px;\n    padding: 3px 8px;\n    white-space: nowrap;\n  }\n  .header-sub {\n    margin-top: .4rem;\n    font-size: 13px;\n    color: #9a8e7c;\n    line-height: 1.6;\n  }\n\n  /* \u2500\u2500 Legend row \u2500\u2500 */\n  .legend {\n    display: flex;\n    gap: 16px;\n    flex-wrap: wrap;\n    margin-bottom: 2rem;\n    padding: 10px 14px;\n    background: #ede8d8;\n    border: 1px solid #d8ccb4;\n    border-radius: 4px;\n  }\n  .legend-item {\n    display: flex;\n    align-items: center;\n    gap: 6px;\n    font-size: 11px;\n    color: #5a4e3c;\n  }\n  .legend-dot {\n    width: 10px;\n    height: 10px;\n    border-radius: 50%;\n    flex-shrink: 0;\n  }\n\n  /* \u2500\u2500 Phase wrapper \u2500\u2500 */\n  .phase {\n    margin-bottom: 2.5rem;\n  }\n  .phase-header {\n    display: flex;\n    align-items: center;\n    gap: 10px;\n    margin-bottom: 1rem;\n  }\n  .phase-label {\n    font-family: 'DM Serif Display', serif;\n    font-size: 1.25rem;\n    font-weight: 400;\n    color: #1a1209;\n  }\n  .phase-dates {\n    font-size: 11px;\n    color: #9a8e7c;\n    text-transform: uppercase;\n    letter-spacing: .08em;\n  }\n  .phase-line {\n    flex: 1;\n    height: 1px;\n    background: #d8ccb4;\n  }\n\n  /* \u2500\u2500 Week cards \u2500\u2500 */\n  .weeks {\n    display: flex;\n    flex-direction: column;\n    gap: 10px;\n  }\n  .week {\n    display: grid;\n    grid-template-columns: 90px 1fr;\n    gap: 0;\n    border: 1px solid #d8ccb4;\n    border-radius: 4px;\n    overflow: hidden;\n    background: #fff9ef;\n    transition: box-shadow 0.15s ease;\n  }\n  .week:hover {\n    box-shadow: 0 2px 8px rgba(139,109,65,0.13);\n  }\n  .week-num {\n    padding: 10px 12px;\n    background: #ede8d8;\n    border-right: 1px solid #d8ccb4;\n    display: flex;\n    flex-direction: column;\n    align-items: flex-start;\n    justify-content: center;\n    gap: 2px;\n  }\n  .week-num-label {\n    font-size: 9px;\n    text-transform: uppercase;\n    letter-spacing: .12em;\n    color: #9a8e7c;\n  }\n  .week-num-n {\n    font-family: 'DM Serif Display', serif;\n    font-size: 1.4rem;\n    color: #5a4e3c;\n    line-height: 1;\n  }\n  .week-dates-small {\n    font-size: 9px;\n    color: #9a8e7c;\n    margin-top: 3px;\n  }\n  .week-body {\n    padding: 10px 14px;\n    display: flex;\n    flex-direction: column;\n    gap: 7px;\n  }\n  .week-focus {\n    font-family: 'Noto Serif JP', serif;\n    font-size: 14px;\n    color: #1a1209;\n    font-weight: 500;\n    line-height: 1.4;\n  }\n  .week-tags {\n    display: flex;\n    gap: 6px;\n    flex-wrap: wrap;\n  }\n  .tag {\n    display: inline-flex;\n    align-items: center;\n    gap: 4px;\n    font-size: 10px;\n    padding: 2px 8px;\n    border-radius: 4px;\n    white-space: nowrap;\n  }\n  .tag-dot {\n    width: 6px;\n    height: 6px;\n    border-radius: 50%;\n    flex-shrink: 0;\n  }\n  /* tag color variants */\n  .tag-quartet   { background: #fce8f3; color: #e5007f; border: 1px solid #f5b3d9; }\n  .tag-tutor     { background: #fff0f6; color: #ff7aac; border: 1px solid #ffd4e8; }\n  .tag-js        { background: #f5e8e8; color: #8b1a1a; border: 1px solid #e8c5c5; }\n  .tag-review    { background: #ede8d8; color: #5a4e3c; border: 1px solid #d8ccb4; }\n  .tag-exam      { background: #fdf3e0; color: #7a5a00; border: 1px solid #e8d88b; }\n  .tag-wk        { background: #eaedfe; color: #1c45f5; border: 1px solid #c0ccfa; }\n  .week-tasks {\n    font-size: 11px;\n    color: #5a4e3c;\n    line-height: 1.8;\n  }\n  .week-tasks li {\n    list-style: none;\n    padding-left: 14px;\n    position: relative;\n  }\n  .week-tasks li::before {\n    content: '\u2014';\n    position: absolute;\n    left: 0;\n    color: #d8ccb4;\n  }\n\n  /* \u2500\u2500 Milestone row \u2500\u2500 */\n  .milestone {\n    grid-column: 1 / -1;\n    background: #8b1a1a;\n    color: #fff;\n    border: none;\n    border-radius: 4px;\n    padding: 10px 16px;\n    display: flex;\n    align-items: center;\n    gap: 10px;\n    font-size: 13px;\n  }\n  .milestone-icon { font-size: 16px; }\n  .milestone-text { flex: 1; font-family: 'Noto Serif JP', serif; }\n  .milestone-date { font-size: 11px; color: rgba(255,255,255,0.65); text-transform: uppercase; letter-spacing: .08em; }\n  .milestone-wk {\n    background: #1c45f5;\n    color: #fff;\n    border: none;\n    border-radius: 4px;\n    padding: 10px 16px;\n    display: flex;\n    align-items: center;\n    gap: 10px;\n    font-size: 13px;\n  }\n\n  /* \u2500\u2500 Summary boxes \u2500\u2500 */\n  .summary-grid {\n    display: grid;\n    grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));\n    gap: 10px;\n    margin-bottom: 2.5rem;\n  }\n  .summary-card {\n    background: #ede8d8;\n    border: 1px solid #d8ccb4;\n    border-radius: 4px;\n    padding: 14px 16px;\n  }\n  .summary-card-label {\n    font-size: 9px;\n    text-transform: uppercase; tor \u00d72<\/span>\n          <\/div>\n          <ul class=\"week-tasks\">\n            <li>Intensive drill on one remaining weak section (from test 3 analysis)<\/li>\n            <li>Full kanji / vocab SRS review \u2014 no new material<\/li>\n            <li>Tutor: simulated exam questions, timing practice<\/li>\n          <\/ul>\n        <\/div>\n      <\/div>\n\n            <div class=\"week\" data-week=\"29\">\n        <div class=\"week-num\">\n          <span class=\"week-current-label\">\u25b6 This week<\/span>\n          <span class=\"week-num-label\">Wks<\/span>\n          <span class=\"week-num-n\">29+<\/span>\n          <span class=\"week-dates-small\">Nov 9\u201315<\/span>\n        <\/div>\n        <div class=\"week-body\">\n          <div class=\"week-focus\">Light Maintenance & Confidence<\/div>\n          <div class=\"week-tags\">\n            <span class=\"tag tag-exam\"><span class=\"tag-dot td-exam\"><\/span>Light review<\/span>\n            <span class=\"tag tag-tutor\"><span class=\"tag-dot td-tutor\"><\/span>Tutor \u00d72<\/span>\n          <\/div>\n          <ul class=\"week-tasks\">\n            <li>Daily SRS only \u2014 no cramming new grammar<\/li>\n            <li>1 timed reading + 1 listening set every other day<\/li>\n            <li>Tutor: light conversation sessions, confidence building<\/li>\n            <li>Final week: rest, review exam logistics, and trust the preparation<\/li>\n          <\/ul>\n        <\/div>\n      <\/div>\n\n      <!-- JLPT Exam Milestone -->\n      <div class=\"milestone-wk\">\n        <span class=\"milestone-icon\">\u2b06<\/span>\n        <span class=\"milestone-text\">WaniKani goal \u2014 Level 30 \u00b7 197/252 Quartet kanji (78%) \u00b7 freeze lessons Nov 22<\/span>\n        <span class=\"milestone-date\">~Nov 22<\/span>\n      <\/div>\n\n\n      <!-- Week 30 -->\n      <div class=\"week\" data-week=\"30\">\n        <div class=\"week-num\">\n          <span class=\"week-current-label\">\u25b6 This week<\/span>\n          <span class=\"week-num-label\">Week<\/span>\n          <span class=\"week-num-n\">30<\/span>\n          <span class=\"week-dates-small\">Nov 16 \u2013 Dec 6<\/span>\n        <\/div>\n        <div class=\"week-body\">\n          <div class=\"week-focus\">Final Exam Prep & Review Buffer<\/div>\n          <div class=\"week-tags\">\n            <span class=\"tag tag-exam\"><span class=\"tag-dot td-exam\"><\/span>Exam prep<\/span>\n            <span class=\"tag tag-review\"><span class=\"tag-dot td-review\"><\/span>Review<\/span>\n            <span class=\"tag tag-wk\"><span class=\"tag-dot td-wk\"><\/span>WK reviews only<\/span>\n          <\/div>\n          <ul class=\"week-tasks\">\n            <li>Complete final N3 mock test under timed conditions; review all errors carefully<\/li>\n            <li>Drill weakest grammar patterns and vocabulary from practice test results<\/li>\n            <li>Listening: daily N3 practice sets \u2014 aim for full 40-minute sessions<\/li>\n            <li>WaniKani: reviews only from Nov 22 \u2014 no new lessons until after the exam<\/li>\n            <li>Rest well the final few days; light review only in the 48 hours before Dec 6<\/li>\n          <\/ul>\n        <\/div>\n      <\/div>\n\n      <!-- Exam milestone -->\n      <div class=\"milestone\" style=\"background:#8b1a1a;\">\n        <span class=\"milestone-icon\">\ud83c\udfaf<\/span>\n        <span class=\"milestone-text\">JLPT N3 Exam Day &nbsp;\u2014 \u304c\u3093\u3070\u308c\uff01<\/span>\n        <span class=\"milestone-date\">December 6, 2026<\/span>\n      <\/div>\n\n    <\/div>\n  <\/div>\n\n  <!-- Tips -->\n  <div class=\"tips-section\">\n    <div class=\"tips-title\">Study Notes & Strategies<\/div>\n    <div class=\"tips-grid\">\n      <div class=\"tip\">\n        <strong>Diary as grammar practice<\/strong>\n        Write each diary entry using at least 2\u20133 of the Quartet grammar patterns you're currently studying. Add furigana with your web app \u2014 reading back old entries reinforces both kanji and structure.\n      <\/div>\n      <div class=\"tip\">\n        <strong>Tutor session structure<\/strong>\n        Since your tutor follows Quartet, let her lead the grammar explanation; use the second session each week for production: speaking, composition review, or a grammar quiz. Keep a shared error log.\n      <\/div>\n      <div class=\"tip\">\n        <strong>Japan Society synergy<\/strong>\n        The JS kanji focus complements Quartet's 45 kanji/lesson. Cross-reference JS kanji lists with your Quartet \u5225\u518a \u2014 overlap reinforces retention, gaps expand your total N3 coverage.\n      <\/div>\n      <div class=\"tip\">\n        <strong>Confusable grammar pairs<\/strong>\n        N3 tests subtle distinctions. Keep a running two-column notebook: pattern on the left, nuance + example on the right. Prime targets: \u306f\u305a\u3060 / \u308f\u3051\u3060 / \u3088\u3046\u3060 / \u3089\u3057\u3044.\n      <\/div>\n      <div class=\"tip\">\n        <strong>Listening starts now<\/strong>\n        Don't wait for Phase 3. Even 10 minutes of N3 listening daily from Week 1 trains your ear before it matters. Try Nihongo con Teppei for Beginners or JLPT Story podcast.\n      <\/div>\n      <div class=\"tip\">\n        <strong>Bunpro SRS<\/strong>\n        Use the Quartet deck on Bunpro to study the \u5225\u518a vocabulary with spaced repetition \u2014 it's aligned directly to the textbook lesson by lesson. Bunpro also covers N3 grammar points, so you can run grammar SRS alongside vocab in the same app. Link your WaniKani account in Bunpro settings to have furigana shown or hidden dynamically based on your WK level.\n      <\/div>\n      <div class=\"tip\">\n        <strong>WaniKani pacing<\/strong>\n        L9 \u2192 L30 in ~32 weeks means leveling up roughly every <strong>10 days<\/strong> at <strong>~16 lessons per day<\/strong> (~3 new kanji + 12 vocab + 1 radical on average). Keep your Apprentice queue under 100 items to hold daily reviews to a manageable 130\u2013170. Freeze all new lessons on <strong>November 22<\/strong> (2 weeks before the December 6 exam) \u2014 reviews only from that point.\n      <\/div>\n    <\/div>\n  <\/div>\n\n<\/div>", script: "\n  // Week start dates (Monday), week number\n  const weekSchedule = [\n    [1,  [2026,4,28]],\n    [2,  [2026,5,5]],\n    [3,  [2026,5,12]],\n    [4,  [2026,5,19]],\n    [5,  [2026,5,26]],\n    [6,  [2026,6,2]],\n    [7,  [2026,6,9]],\n    [8,  [2026,6,16]],\n    [9,  [2026,6,23]],\n    [10, [2026,6,30]],\n    [11, [2026,7,7]],\n    [12, [2026,7,14]],\n    [13, [2026,7,21]],\n    [14, [2026,7,28]],\n    [15, [2026,8,4]],\n    [16, [2026,8,11]],\n    [17, [2026,8,18]],\n    [18, [2026,8,25]],\n    [19, [2026,9,1]],\n    [20, [2026,9,8]],\n    [21, [2026,9,15]],\n    [22, [2026,9,22]],\n    [23, [2026,9,29]],\n    [24, [2026,10,6]],\n    [25, [2026,10,13]],\n    [26, [2026,10,20]],\n    [27, [2026,10,27]],\n    [28, [2026,11,3]],\n  ];\n\n  function toDate([y,m,d]) { return new Date(y, m-1, d); }\n\n  document.addEventListener('DOMContentLoaded', () => {\n    const today = new Date();\n    today.setHours(0,0,0,0);\n\n    // Find current week number\n    let currentWeek = null;\n    for (let i = 0; i < weekSchedule.length; i++) {\n      const [wnum, startArr] = weekSchedule[i];\n      const start = toDate(startArr);\n      const end = i + 1 < weekSchedule.length\n        ? toDate(weekSchedule[i+1][1])\n        : new Date(start.getTime() + 7 * 86400000);\n      if (today >= start && today < end) { currentWeek = wnum; break; }\n      // If today is before week 1, treat week 1 as current\n      if (i === 0 && today < start) { currentWeek = wnum; break; }\n    }\n\n    // Apply classes to each .week element based on data-week attribute\n    document.querySelectorAll('.week[data-week]').forEach(el => {\n      const w = parseInt(el.dataset.week);\n      if (w === currentWeek) {\n        el.classList.add('is-current');\n        // Scroll into view: near the top with context above\n        setTimeout(() => {\n          let scroller = el.parentElement;\n          while (scroller && scroller.scrollHeight <= scroller.clientHeight) {\n            scroller = scroller.parentElement;\n          }\n          if (!scroller) return;\n          const top = el.getBoundingClientRect().top\n                    - scroller.getBoundingClientRect().top\n                    + scroller.scrollTop\n                    - 90;\n          scroller.scrollTo({ top, behavior: 'smooth' });\n        }, 300);\n      } else if (currentWeek !== null && w < currentWeek) {\n        el.classList.add('is-past');\n      }\n    });\n  });\n" },
  { style: "\n*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n\n.doc-root {\n  font-family: 'Noto Sans JP', sans-serif;\n  background: #F7F3E8;\n  background-image:\n    linear-gradient(rgba(139,109,65,0.10) 1px, transparent 1px),\n    linear-gradient(90deg, rgba(139,109,65,0.10) 1px, transparent 1px);\n  background-size: 24px 24px;\n  color: #1a1209;\n  min-height: 100vh;\n  padding: 3rem 1.5rem 4rem;\n}\n\n.container { max-width: 860px; margin: 0 auto; }\n\n/* \u2500\u2500 Header \u2500\u2500 */\nheader {\n  margin-bottom: 2rem;\n  padding-bottom: 1.25rem;\n  border-bottom: 1px solid #d8ccb4;\n}\nh1 {\n  font-family: 'DM Serif Display', serif;\n  font-size: 1.9rem;\n  font-weight: 400;\n  color: #8b1a1a;\n  letter-spacing: .02em;\n  line-height: 1.1;\n}\n.header-sub {\n  font-size: 12px;\n  color: #9a8e7c;\n  margin-top: .4rem;\n  line-height: 1.6;\n}\n\n/* \u2500\u2500 How-to note \u2500\u2500 */\n.how-to {\n  background: #ede8d8;\n  border: 1px solid #d8ccb4;\n  border-radius: 4px;\n  padding: .9rem 1.1rem;\n  margin-bottom: 1.75rem;\n  font-size: 12px;\n  color: #5a4e3c;\n  line-height: 1.7;\n}\n.how-to strong { color: #1a1209; }\n\n/* \u2500\u2500 Reference table \u2500\u2500 */\n.ref-table-wrap {\n  border: 1px solid #d8ccb4;\n  border-radius: 6px;\n  overflow: hidden;\n  background: #fff9ef;\n  box-shadow: 0 2px 12px rgba(139,109,65,0.07);\n  margin-bottom: 2rem;\n}\n\ntable {\n  width: 100%;\n  border-collapse: collapse;\n  font-size: 12px;\n}\n\n/* Column headers */\nthead th {\n  background: #ede8d8;\n  border-bottom: 2px solid #d8ccb4;\n  padding: 8px 12px;\n  text-align: left;\n  font-size: 9px;\n  text-transform: uppercase;\n  letter-spacing: .1em;\n  color: #9a8e7c;\n  font-weight: 500;\n}\nthead th:not(:last-child) { border-right: 1px solid #d8ccb4; }\nthead th.col-subject-label { width: 130px; text-align: center; }\nthead th.col-field-s { width: 180px; }\nthead th.col-field-t { width: 220px; }\nthead th.col-notes { }\n\n/* Body rows */\ntbody tr {\n  border-bottom: 1px solid #d8ccb4;\n}\ntbody tr:last-child { border-bottom: none; }\ntbody td {\n  padding: 0;\n  vertical-align: top;\n}\ntbody td:not(:last-child) { border-right: 1px solid #d8ccb4; }\n\n/* Subject label cell */\n.subject-cell {\n  display: flex;\n  align-items: center;\n  gap: 10px;\n  padding: 12px 12px;\n  height: 100%;\n}\n.subj-accent {\n  width: 4px;\n  border-radius: 2px;\n  align-self: stretch;\n  flex-shrink: 0;\n  min-height: 40px;\n}\n.subj-text {}\n.subj-jp {\n  font-family: 'Noto Serif JP', serif;\n  font-size: 15px;\n  font-weight: 500;\n  color: #1a1209;\n  line-height: 1.2;\n}\n.subj-en {\n  font-size: 9px;\n  text-transform: uppercase;\n  letter-spacing: .09em;\n  color: #9a8e7c;\n  margin-top: 2px;\n}\n.subj-resource {\n  font-size: 9px;\n  color: #5a4e3c;\n  margin-top: 3px;\n  font-style: italic;\n}\n\n/* Content cells */\n.content-cell {\n  padding: 10px 12px;\n  height: 100%;\n}\n\n/* Field label */\n.field-lbl {\n  font-size: 8px;\n  text-transform: uppercase;\n  letter-spacing: .1em;\n  color: #9a8e7c;\n  margin-bottom: 5px;\n  padding-bottom: 3px;\n  border-bottom: 1px solid #ede8d8;\n}\n\n/* Example chips */\n.chips {\n  display: flex;\n  flex-wrap: wrap;\n  gap: 4px;\n  margin-bottom: 5px;\n}\n.chip {\n  display: inline-block;\n  font-size: 10px;\n  padding: 2px 7px;\n  border-radius: 3px;\n  background: #ede8d8;\n  border: 1px solid #d8ccb4;\n  color: #5a4e3c;\n  white-space: nowrap;\n}\n.chip.accent {\n  background: #f5e8e8;\n  border-color: #e8c5c5;\n  color: #8b1a1a;\n}\n\n/* Example rows */\n.examples {\n  display: flex;\n  flex-direction: column;\n  gap: 3px;\n}\n.example-row {\n  display: flex;\n  align-items: baseline;\n  gap: 5px;\n  font-size: 10px;\n  color: #5a4e3c;\n  line-height: 1.5;\n}\n.example-row::before {\n  content: '\u2014';\n  color: #d8ccb4;\n  flex-shrink: 0;\n}\n\n/* Notes cell */\n.notes-cell {\n  padding: 10px 12px;\n}\n.note-text {\n  font-size: 10px;\n  color: #9a8e7c;\n  line-height: 1.7;\n  font-style: italic;\n}\n.note-tip {\n  display: inline-block;\n  margin-top: 5px;\n  font-size: 9px;\n  background: #ede8d8;\n  border: 1px solid #d8ccb4;\n  border-radius: 3px;\n  padding: 2px 6px;\n  color: #5a4e3c;\n  font-style: normal;\n  white-space: nowrap;\n}\n\n/* Divider rows (section separators) */\ntr.section-divider td {\n  background: #ede8d8;\n  padding: 4px 12px;\n  font-size: 9px;\n  text-transform: uppercase;\n  letter-spacing: .1em;\n  color: #9a8e7c;\n  border-bottom: 1px solid #d8ccb4;\n}\n\n/* \u2500\u2500 Bottom legend \u2500\u2500 */\n.legend-row {\n  display: flex;\n  gap: 12px;\n  flex-wrap: wrap;\n  margin-bottom: 2rem;\n}\n.legend-item {\n  display: flex;\n  align-items: center;\n  gap: 6px;\n  font-size: 10px;\n  color: #5a4e3c;\n}\n.legend-bar {\n  width: 14px;\n  height: 14px;\n  border-radius: 2px;\n  flex-shrink: 0;\n}\n\n/* \u2500\u2500 Tips section \u2500\u2500 */\n.tips {\n  background: #ede8d8;\n  border: 1px solid #d8ccb4;\n  border-radius: 6px;\n  padding: 1.1rem 1.4rem;\n}\n.tips-title {\n  font-family: 'DM Serif Display', serif;\n  font-size: 1.05rem;\n  color: #1a1209;\n  margin-bottom: .8rem;\n}\n.tips-grid {\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));\n  gap: 8px;\n}\n.tip {\n  font-size: 11px;\n  color: #5a4e3c;\n  line-height: 1.7;\n  padding: 8px 10px;\n  background: #F7F3E8;\n  border: 1px solid #d8ccb4;\n  border-radius: 4px;\n}\n.tip strong {\n  display: block;\n  font-size: 9px;\n  text-transform: uppercase;\n  letter-spacing: .08em;\n  color: #8b1a1a;\n  margin-bottom: 3px;\n}\n\n@media print {\n  .doc-root { background: white; background-image: none; padding: 1.5rem; }\n  .container { max-width: 100%; }\n  .ref-table-wrap { box-shadow: none; }\n}\n", body: "<div class=\"container\">\n\n<header>\n  <h1>\u9031\u9593\u30d7\u30e9\u30f3\u30ca\u30fc \u2014 Reference Card<\/h1>\n  <div class=\"header-sub\">Subject rows and field suggestions for your physical planner \u00b7 N3 Study Plan 2026<\/div>\n<\/header>\n\n<div class=\"how-to\">\n  <strong>How to use this card:<\/strong> Each row below corresponds to one subject row in your Hobonichi planner.\n  The <strong>Subject<\/strong> column shows what to write in the left sub-field of each day's cell (the resource or lesson you're working in).\n  The <strong>Topic / Page<\/strong> column shows what to write in the right sub-field (the specific content, exercise, or page range).\n  Use the examples as starting points \u2014 adapt freely as your plan progresses.\n<\/div>\n\n<!-- Colour legend -->\n<div class=\"legend-row\">\n  <div class=\"legend-item\"><div class=\"legend-bar\" style=\"background:#e5007f;\"><\/div>Quartet<\/div>\n  <div class=\"legend-item\"><div class=\"legend-bar\" style=\"background:#1c45f5;\"><\/div>WaniKani<\/div>\n  <div class=\"legend-item\"><div class=\"legend-bar\" style=\"background:#c74a4a;\"><\/div>Bunpro<\/div>\n  <div class=\"legend-item\"><div class=\"legend-bar\" style=\"background:#ff7aac;\"><\/div>Tutoring<\/div>\n  <div class=\"legend-item\"><div class=\"legend-bar\" style=\"background:#8b1a1a;\"><\/div>JS Class<\/div>\n  <div class=\"legend-item\"><div class=\"legend-bar\" style=\"background:#c8a84b;\"><\/div>\u8aad\u89e3 Reading<\/div>\n  <div class=\"legend-item\"><div class=\"legend-bar\" style=\"background:#9a7ab4;\"><\/div>\u8074\u89e3 Listening<\/div>\n  <div class=\"legend-item\"><div class=\"legend-bar\" style=\"background:#5a7a5a;\"><\/div>\u4f5c\u6587 Writing<\/div>\n<\/div>\n\n<div class=\"ref-table-wrap\">\n<table>\n  <thead>\n    <tr>\n      <th class=\"col-subject-label\">Subject Row<\/th>\n      <th class=\"col-field-s\">Subject field &nbsp;(left sub-cell)<\/th>\n      <th class=\"col-field-t\">Topic / Page field &nbsp;(right sub-cell)<\/th>\n      <th class=\"col-notes\">Notes &amp; tips<\/th>\n    <\/tr>\n  <\/thead>\n  <tbody>\n\n    <!-- SECTION: Core materials -->\n    <tr class=\"section-divider\"><td colspan=\"4\">Core study materials<\/td><\/tr>\n\n    <!-- Quartet -->\n    <tr>\n      <td>\n        <div class=\"subject-cell\">\n          <div class=\"subj-accent\" style=\"background:#e5007f;\"><\/div>\n          <div class=\"subj-text\">\n            <div class=\"subj-jp\">Quartet<\/div>\n            <div class=\"subj-en\">Textbook<\/div>\n            <div class=\"subj-resource\">Quartet Vol. 1<\/div>\n          <\/div>\n        <\/div>\n      <\/td>\n      <td>\n        <div class=\"content-cell\">\n          <div class=\"field-lbl\">Subject \u2014 what section<\/div>\n          <div class=\"chips\">\n            <span class=\"chip\">Quartet L1<\/span>\n            <span class=\"chip\">Quartet L3<\/span>\n            <span class=\"chip\">WB L2<\/span>\n            <span class=\"chip\">Brush-up<\/span>\n          <\/div>\n          <div class=\"examples\">\n            <div class=\"example-row\">Lesson number + section (L, WB = workbook)<\/div>\n            <div class=\"example-row\">Brush-up = \u521d\u7d1a\u6587\u6cd5\u30c1\u30a7\u30c3\u30af / \u6f22\u5b57\u30c1\u30e3\u30ec\u30f3\u30b8<\/div>\n          <\/div>\n        <\/div>\n      <\/td>\n      <td>\n        <div class=\"content-cell\">\n          <div class=\"field-lbl\">Topic / Page \u2014 what specifically<\/div>\n          <div class=\"chips\">\n            <span class=\"chip accent\">\u8aad\u307f\u7269 p.88<\/span>\n            <span class=\"chip accent\">\u6587\u578b p.92\u201398<\/span>\n            <span class=\"chip accent\">\u805e\u304f ex. 1\u20133<\/span>\n          <\/div>\n          <div class=\"examples\">\n            <div class=\"example-row\">\u8aad\u307f\u7269 + page \u00b7 \u6587\u578b + pages \u00b7 \u66f8\u304f / \u8a71\u3059 / \u805e\u304f + exercise #<\/div>\n            <div class=\"example-row\">WB p.30\u201346 \u00b7 \u6f22\u5b57\u30c1\u30e3\u30ec\u30f3\u30b8 L3 \u00b7 \u521d\u7d1a\u6587\u6cd5 \u00a74<\/div>\n          <\/div>\n        <\/div>\n      <\/td>\n      <td>\n        <div class=\"notes-cell\">\n          <div class=\"note-text\">One row covers all four skills of a lesson. Use the topic field to note which skill you did that day.<\/div>\n          <span class=\"note-tip\">\u301c = reading, \u66f8 = writing, \u8a71 = speaking, \u805e = listening<\/span>\n        <\/div>\n      <\/td>\n    <\/tr>\n\n    <!-- WaniKani -->\n    <tr>\n      <td>\n        <div class=\"subject-cell\">\n          <div class=\"subj-accent\" style=\"background:#1c45f5;\"><\/div>\n          <div class=\"subj-text\">\n            <div class=\"subj-jp\">WaniKani<\/div>\n            <div class=\"subj-en\">Kanji SRS<\/div>\n            <div class=\"subj-resource\">wanikani.com<\/div>\n          <\/div>\n        <\/div>\n      <\/td>\n      <td>\n        <div class=\"content-cell\">\n          <div class=\"field-lbl\">Subject \u2014 current level + type<\/div>\n          <div class=\"chips\">\n            <span class=\"chip\">WK L11<\/span>\n            <span class=\"chip\">WK L12<\/span>\n            <span class=\"chip\">Reviews<\/span>\n            <span class=\"chip\">Lessons<\/span>\n          <\/div>\n          <div class=\"examples\">\n            <div class=\"example-row\">Current WK level + whether it was lessons or reviews<\/div>\n            <div class=\"example-row\">Add \u2605 on days you level up<\/div>\n          <\/div>\n        <\/div>\n      <\/td>\n      <td>\n        <div class=\"content-cell\">\n          <div class=\"field-lbl\">Topic / Page \u2014 count + queue<\/div>\n          <div class=\"chips\">\n            <span class=\"chip accent\">15 lessons<\/span>\n            <span class=\"chip accent\">142 reviews<\/span>\n            <span class=\"chip accent\">App: 87<\/span>\n          <\/div>\n          <div class=\"examples\">\n            <div class=\"example-row\">Number of lessons done (target ~15/day)<\/div>\n            <div class=\"example-row\">Review count + Apprentice queue size (App: N)<\/div>\n            <div class=\"example-row\">Note item type: \u6839 radicals \u00b7 \u6f22 kanji \u00b7 \u8a9e vocab<\/div>\n          <\/div>\n        <\/div>\n      <\/td>\n      <td>\n        <div class=\"notes-cell\">\n          <div class=\"note-text\">Daily, even if brief. Keeping Apprentice under 100 keeps reviews at ~130\u2013170/day. Flag level-up days.<\/div>\n          <span class=\"note-tip\">Target: 1 level every ~11 days<\/span>\n        <\/div>\n      <\/td>\n    <\/tr>\n\n    <!-- Bunpro -->\n    <tr>\n      <td>\n        <div class=\"subject-cell\">\n          <div class=\"subj-accent\" style=\"background:#c74a4a;\"><\/div>\n          <div class=\"subj-text\">\n            <div class=\"subj-jp\">Bunpro<\/div>\n            <div class=\"subj-en\">Grammar + Vocab SRS<\/div>\n            <div class=\"subj-resource\">bunpro.jp<\/div>\n          <\/div>\n        <\/div>\n      <\/td>\n      <td>\n        <div class=\"content-cell\">\n          <div class=\"field-lbl\">Subject \u2014 deck or path<\/div>\n          <div class=\"chips\">\n            <span class=\"chip\">Quartet deck<\/span>\n            <span class=\"chip\">N3 grammar<\/span>\n            <span class=\"chip\">Reviews<\/span>\n          <\/div>\n          <div class=\"examples\">\n            <div class=\"example-row\">Quartet deck = \u5225\u518a vocabulary by lesson<\/div>\n            <div class=\"example-row\">N3 grammar = grammar SRS path<\/div>\n          <\/div>\n        <\/div>\n      <\/td>\n      <td>\n        <div class=\"content-cell\">\n          <div class=\"field-lbl\">Topic / Page \u2014 lesson + items<\/div>\n          <div class=\"chips\">\n            <span class=\"chip accent\">\u5225\u518a L2 #45\u201360<\/span>\n            <span class=\"chip accent\">N3 batch 12\u201318<\/span>\n          <\/div>\n          <div class=\"examples\">\n            <div class=\"example-row\">Vocab: \u5225\u518a lesson # + item range<\/div>\n            <div class=\"example-row\">Grammar: batch/point number or pattern name<\/div>\n            <div class=\"example-row\">Reviews: count e.g. 38 reviews<\/div>\n          <\/div>\n        <\/div>\n      <\/td>\n      <td>\n        <div class=\"notes-cell\">\n          <div class=\"note-text\">Daily SRS reviews first; new items second. Link WK account in settings for dynamic furigana.<\/div>\n          <span class=\"note-tip\">Add new Quartet vocab right after each lesson<\/span>\n        <\/div>\n      <\/td>\n    <\/tr>\n\n    <!-- SECTION: Classes & sessions -->\n    <tr class=\"section-divider\"><td colspan=\"4\">Classes &amp; sessions<\/td><\/tr>\n\n    <!-- Tutoring -->\n    <tr>\n      <td>\n        <div class=\"subject-cell\">\n          <div class=\"subj-accent\" style=\"background:#ff7aac;\"><\/div>\n          <div class=\"subj-text\">\n            <div class=\"subj-jp\">\u30c1\u30e5\u30fc\u30bf\u30fc<\/div>\n            <div class=\"subj-en\">Tutoring<\/div>\n            <div class=\"subj-resource\">Tue + Thu \u00b7 50 min<\/div>\n          <\/div>\n        <\/div>\n      <\/td>\n      <td>\n        <div class=\"content-cell\">\n          <div class=\"field-lbl\">Subject \u2014 session focus<\/div>\n          <div class=\"chips\">\n            <span class=\"chip\">Tutor #1<\/span>\n            <span class=\"chip\">Tutor #2<\/span>\n            <span class=\"chip\">L3 \u6587\u578b<\/span>\n            <span class=\"chip\">Speaking<\/span>\n          <\/div>\n          <div class=\"examples\">\n            <div class=\"example-row\">Session # within the week (first vs. second)<\/div>\n            <div class=\"example-row\">Main activity: \u6587\u578b \u00b7 \u4f5c\u6587 \u00b7 \u4f1a\u8a71 \u00b7 quiz<\/div>\n          <\/div>\n        <\/div>\n      <\/td>\n      <td>\n        <div class=\"content-cell\">\n          <div class=\"field-lbl\">Topic / Page \u2014 content covered<\/div>\n          <div class=\"chips\">\n            <span class=\"chip accent\">L3 \u306f\u305a\u3060 p.82<\/span>\n            <span class=\"chip accent\">\u4f5c\u6587 review<\/span>\n            <span class=\"chip accent\">JS debrief<\/span>\n          <\/div>\n          <div class=\"examples\">\n            <div class=\"example-row\">Grammar pattern + page covered<\/div>\n            <div class=\"example-row\">Composition feedback, speaking drill topic<\/div>\n            <div class=\"example-row\">JS debrief = recap of previous Friday's class<\/div>\n          <\/div>\n        <\/div>\n      <\/td>\n      <td>\n        <div class=\"notes-cell\">\n          <div class=\"note-text\">Appears Tue + Thu each week. Second session is for production (speaking, composition, quiz) \u2014 note which in the subject field.<\/div>\n          <span class=\"note-tip\">Debrief last JS class on first Tue session<\/span>\n        <\/div>\n      <\/td>\n    <\/tr>\n\n    <!-- JS Class -->\n    <tr>\n      <td>\n        <div class=\"subject-cell\">\n          <div class=\"subj-accent\" style=\"background:#8b1a1a;\"><\/div>\n          <div class=\"subj-text\">\n            <div class=\"subj-jp\">JS\u6388\u696d<\/div>\n            <div class=\"subj-en\">Japan Society<\/div>\n            <div class=\"subj-resource\">Fri 6:30pm \u00b7 5/22\u20138/7<\/div>\n          <\/div>\n        <\/div>\n      <\/td>\n      <td>\n        <div class=\"content-cell\">\n          <div class=\"field-lbl\">Subject \u2014 class number<\/div>\n          <div class=\"chips\">\n            <span class=\"chip\">JS Class 1<\/span>\n            <span class=\"chip\">JS Class 4<\/span>\n            <span class=\"chip\">JS Class 10<\/span>\n          <\/div>\n          <div class=\"examples\">\n            <div class=\"example-row\">Class number (1\u201310 over 10 Fridays)<\/div>\n            <div class=\"example-row\">Skip dates: 6/19 \u00b7 7/3 \u2014 leave blank<\/div>\n          <\/div>\n        <\/div>\n      <\/td>\n      <td>\n        <div class=\"content-cell\">\n          <div class=\"field-lbl\">Topic / Page \u2014 what was covered<\/div>\n          <div class=\"chips\">\n            <span class=\"chip accent\">N3 grammar review<\/span>\n            <span class=\"chip accent\">\u6f22\u5b57 set A<\/span>\n            <span class=\"chip accent\">\u8074\u89e3 practice<\/span>\n          <\/div>\n          <div class=\"examples\">\n            <div class=\"example-row\">Grammar points introduced in class<\/div>\n            <div class=\"example-row\">Kanji set covered (cross-ref \u5225\u518a)<\/div>\n            <div class=\"example-row\">Note any exam tips from instructor<\/div>\n          <\/div>\n        <\/div>\n      <\/td>\n      <td>\n        <div class=\"notes-cell\">\n          <div class=\"note-text\">Friday only. 10 classes total. Class 10 (8/7) is the last \u2014 write exam tips in notes. Leave blank on 6/19 and 7/3.<\/div>\n          <span class=\"note-tip\">Cross-ref JS kanji with Quartet \u5225\u518a<\/span>\n        <\/div>\n      <\/td>\n    <\/tr>\n\n    <!-- SECTION: Skills -->\n    <tr class=\"section-divider\"><td colspan=\"4\">Skills practice<\/td><\/tr>\n\n    <!-- Reading -->\n    <tr>\n      <td>\n        <div class=\"subject-cell\">\n          <div class=\"subj-accent\" style=\"background:#c8a84b;\"><\/div>\n          <div class=\"subj-text\">\n            <div class=\"subj-jp\">\u8aad\u89e3<\/div>\n            <div class=\"subj-en\">Reading<\/div>\n            <div class=\"subj-resource\">NHK Web Easy \u00b7 Quartet<\/div>\n          <\/div>\n        <\/div>\n      <\/td>\n      <td>\n        <div class=\"content-cell\">\n          <div class=\"field-lbl\">Subject \u2014 source<\/div>\n          <div class=\"chips\">\n            <span class=\"chip\">NHK Easy<\/span>\n            <span class=\"chip\">Quartet<\/span>\n            <span class=\"chip\">Practice test<\/span>\n          <\/div>\n          <div class=\"examples\">\n            <div class=\"example-row\">NHK Easy \u00b7 Quartet reading section \u00b7 mock test<\/div>\n          <\/div>\n        <\/div>\n      <\/td>\n      <td>\n        <div class=\"content-cell\">\n          <div class=\"field-lbl\">Topic / Page \u2014 content + time<\/div>\n          <div class=\"chips\">\n            <span class=\"chip accent\">2 articles \u00b7 10min<\/span>\n            <span class=\"chip accent\">\u8aad\u307f\u7269 p.88 timed<\/span>\n          <\/div>\n          <div class=\"examples\">\n            <div class=\"example-row\">Article count or page range + time spent<\/div>\n            <div class=\"example-row\">Note if timed (builds exam stamina)<\/div>\n          <\/div>\n        <\/div>\n      <\/td>\n      <td>\n        <div class=\"notes-cell\">\n          <div class=\"note-text\">Daily from Phase 2 onward. Read questions first; practice skimming. Note unknown vocab in diary.<\/div>\n          <span class=\"note-tip\">Target: 1 passage/day from Week 14<\/span>\n        <\/div>\n      <\/td>\n    <\/tr>\n\n    <!-- Listening -->\n    <tr>\n      <td>\n        <div class=\"subject-cell\">\n          <div class=\"subj-accent\" style=\"background:#9a7ab4;\"><\/div>\n          <div class=\"subj-text\">\n            <div class=\"subj-jp\">\u8074\u89e3<\/div>\n            <div class=\"subj-en\">Listening<\/div>\n            <div class=\"subj-resource\">OTO Navi \u00b7 Teppei \u00b7 JLPT audio<\/div>\n          <\/div>\n        <\/div>\n      <\/td>\n      <td>\n        <div class=\"content-cell\">\n          <div class=\"field-lbl\">Subject \u2014 source<\/div>\n          <div class=\"chips\">\n            <span class=\"chip\">OTO Navi<\/span>\n            <span class=\"chip\">Teppei<\/span>\n            <span class=\"chip\">JLPT audio<\/span>\n          <\/div>\n          <div class=\"examples\">\n            <div class=\"example-row\">OTO Navi = Quartet's official audio app<\/div>\n            <div class=\"example-row\">Teppei = Nihongo con Teppei for Beginners<\/div>\n          <\/div>\n        <\/div>\n      <\/td>\n      <td>\n        <div class=\"content-cell\">\n          <div class=\"field-lbl\">Topic / Page \u2014 episode + duration<\/div>\n          <div class=\"chips\">\n            <span class=\"chip accent\">L3 ex. 1\u20133<\/span>\n            <span class=\"chip accent\">ep.14 \u00b7 15min<\/span>\n            <span class=\"chip accent\">N3 set 2<\/span>\n          <\/div>\n          <div class=\"examples\">\n            <div class=\"example-row\">OTO Navi: lesson # + exercise numbers<\/div>\n            <div class=\"example-row\">Podcast: episode # + minutes listened<\/div>\n            <div class=\"example-row\">JLPT: practice set number<\/div>\n          <\/div>\n        <\/div>\n      <\/td>\n      <td>\n        <div class=\"notes-cell\">\n          <div class=\"note-text\">Even 10min daily from Week 1 builds your ear before it matters. Note 3 unknown words per session.<\/div>\n          <span class=\"note-tip\">Start daily from Week 1 \u2014 don't wait<\/span>\n        <\/div>\n      <\/td>\n    <\/tr>\n\n    <!-- Writing -->\n    <tr>\n      <td>\n        <div class=\"subject-cell\">\n          <div class=\"subj-accent\" style=\"background:#5a7a5a;\"><\/div>\n          <div class=\"subj-text\">\n            <div class=\"subj-jp\">\u4f5c\u6587<\/div>\n            <div class=\"subj-en\">Writing / Diary<\/div>\n            <div class=\"subj-resource\">\u65e5\u8a18 \u00b7 \u4f5c\u6587 draft<\/div>\n          <\/div>\n        <\/div>\n      <\/td>\n      <td>\n        <div class=\"content-cell\">\n          <div class=\"field-lbl\">Subject \u2014 type of writing<\/div>\n          <div class=\"chips\">\n            <span class=\"chip\">\u65e5\u8a18<\/span>\n            <span class=\"chip\">\u4f5c\u6587 draft<\/span>\n            <span class=\"chip\">Error log<\/span>\n            <span class=\"chip\">Henshall<\/span>\n          <\/div>\n          <div class=\"examples\">\n            <div class=\"example-row\">\u65e5\u8a18 = diary entry in your web app<\/div>\n            <div class=\"example-row\">\u4f5c\u6587 = Quartet composition assignment<\/div>\n            <div class=\"example-row\">Error log = tutor correction review<\/div>\n            <div class=\"example-row\">Henshall = \u3072\u3089\u304c\u306a / \u30ab\u30bf\u30ab\u30ca workbook practice (not JLPT \u2014 handwriting only)<\/div>\n          <\/div>\n        <\/div>\n      <\/td>\n      <td>\n        <div class=\"content-cell\">\n          <div class=\"field-lbl\">Topic / Page \u2014 grammar used + length<\/div>\n          <div class=\"chips\">\n            <span class=\"chip accent\">L3 grammar \u00d73<\/span>\n            <span class=\"chip accent\">\u66f8\u304f p.100 draft<\/span>\n            <span class=\"chip accent\">150\u5b57<\/span>\n            <span class=\"chip accent\">\u3072\u3089\u304c\u306a p.12\u201318<\/span>\n            <span class=\"chip accent\">\u30ab\u30bf\u30ab\u30ca p.34<\/span>\n          <\/div>\n          <div class=\"examples\">\n            <div class=\"example-row\">Grammar pattern(s) deliberately used in diary<\/div>\n            <div class=\"example-row\">Quartet \u66f8\u304f section page + draft/final<\/div>\n            <div class=\"example-row\">Character count (\u76ee\u6a19: 150\u2013200\u5b57)<\/div>\n            <div class=\"example-row\">Henshall: script (\u3072\u3089 / \u30ab\u30bf) + page range in workbook<\/div>\n          <\/div>\n        <\/div>\n      <\/td>\n      <td>\n        <div class=\"notes-cell\">\n          <div class=\"note-text\">Aim for \u22652\u20133 Quartet grammar patterns per diary entry. Add furigana in your web app for review later.<\/div>\n          <span class=\"note-tip\">Diary entries reinforce both kanji + grammar<\/span>\n          <div class=\"note-text\" style=\"margin-top:6px;\">Henshall workbook is independent of N3 \u2014 use it as a warm-up or wind-down activity. Track \u3072\u3089\u304c\u306a and \u30ab\u30bf\u30ab\u30ca separately until both feel natural.<\/div>\n          <span class=\"note-tip\">Henshall: Learning Japanese Hiragana and Katakana \u2014 Henshall &amp; Gamage<\/span>\n        <\/div>\n      <\/td>\n    <\/tr>\n\n  <\/tbody>\n<\/table>\n<\/div>\n\n<!-- Tips -->\n<div class=\"tips\">\n  <div class=\"tips-title\">Planner tips for N3 study<\/div>\n  <div class=\"tips-grid\">\n    <div class=\"tip\">\n      <strong>Daily time tracker<\/strong>\n      Use the bottom row of each day's column for total study minutes. Aim for 90\u2013120min on weekdays, 60min on weekends minimum. Circle the day if you hit your target.\n    <\/div>\n    <div class=\"tip\">\n      <strong>Weekly total<\/strong>\n      Aim for 700\u2013840 min/week (\u224812\u201314 hrs). Mark WaniKani level-up days with a star \u2605 in the weekly notes strip.\n    <\/div>\n    <div class=\"tip\">\n      <strong>Tue / Thu pattern<\/strong>\n      Tutor sessions are fixed. On Tue: debrief last Friday's JS class content. On Thu: produce \u2014 speaking drill, composition, or grammar quiz.\n    <\/div>\n    <div class=\"tip\">\n      <strong>Friday JS weeks<\/strong>\n      JS class is the last activity of the week (after Tue/Thu tutor). Note the class number in the subject field so you can track all 10.\n    <\/div>\n    <div class=\"tip\">\n      <strong>Blank days are fine<\/strong>\n      WaniKani reviews are truly daily; everything else has lighter days built in. A blank row means you didn't touch that subject \u2014 use it to spot imbalances at the weekly review.\n    <\/div>\n    <div class=\"tip\">\n      <strong>Weekly review ritual<\/strong>\n      On Sunday evening: count total hours, check which subjects got skipped, adjust the coming week's focus. Write a one-line \u53cd\u7701 (reflection) in the notes strip.\n    <\/div>\n  <\/div>\n<\/div>\n\n<\/div>", script: "" },
  { style: "\n*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n.doc-root {\n  font-family: 'Noto Sans JP', sans-serif;\n  background: #F7F3E8;\n  background-image:\n    linear-gradient(rgba(139,109,65,0.10) 1px, transparent 1px),\n    linear-gradient(90deg, rgba(139,109,65,0.10) 1px, transparent 1px);\n  background-size: 24px 24px;\n  color: #1a1209;\n  min-height: 100vh;\n  padding: 3rem 1.5rem 4rem;\n}\n.container { max-width: 920px; margin: 0 auto; }\n\nheader { margin-bottom: 2rem; border-bottom: 1px solid #d8ccb4; padding-bottom: 1.5rem; }\nh1 { font-family: 'DM Serif Display', serif; font-size: 1.9rem; font-weight: 400; color: #8b1a1a; letter-spacing: .02em; }\n.sub { font-size: 13px; color: #9a8e7c; margin-top: .3rem; }\n\n.cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(145px, 1fr)); gap: 10px; margin-bottom: 2rem; }\n.card { background: #ede8d8; border: 1px solid #d8ccb4; border-radius: 4px; padding: 12px 14px; }\n.card-label { font-size: 9px; text-transform: uppercase; letter-spacing: .12em; color: #9a8e7c; margin-bottom: 4px; }\n.card-value { font-family: 'DM Serif Display', serif; font-size: 1.6rem; color: #8b1a1a; line-height: 1; }\n.card-sub { font-size: 11px; color: #5a4e3c; margin-top: 3px; }\n\n.section-title { font-family: 'DM Serif Display', serif; font-size: 1.15rem; color: #1a1209; margin-bottom: .75rem; margin-top: 2rem; }\n.divider { border: none; border-top: 1px solid #d8ccb4; margin: 1.75rem 0; }\n\n/* Phase header bands */\n.phase-band {\n  display: flex; align-items: center; gap: 10px;\n  padding: 7px 12px; border-radius: 4px;\n  margin-bottom: 6px; margin-top: 18px;\n  font-size: 11px; font-weight: 500; letter-spacing: .06em; text-transform: uppercase;\n}\n.band-pleasant { background: #e8f4f8; border: 1px solid #b8d8e8; color: #1a4a6b; }\n.band-painful  { background: #fdf3e0; border: 1px solid #e8d88b; color: #7a5a00; }\n.band-death    { background: #f5e8e8; border: 1px solid #e8c5c5; color: #8b1a1a; }\n.band-hell     { background: #ede8d8; border: 1px solid #c8b890; color: #5a4020; }\n.band-paradise { background: #e8ede8; border: 1px solid #b0c8b0; color: #2a5a2a; }\n.band-reality  { background: #ece8f0; border: 1px solid #c0b0d0; color: #3a1a5a; }\n\n.band-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }\n.band-range { margin-left: auto; font-size: 10px; opacity: .7; }\n\n/* Row layout */\n.level-row {\n  display: grid;\n  grid-template-columns: 46px 36px 56px 70px 1fr;\n  gap: 0;\n  border: 1px solid #d8ccb4;\n  border-radius: 4px;\n  margin-bottom: 5px;\n  overflow: hidden;\n  background: #fff9ef;\n}\n.level-row.row-you { background: #e8f0e8; border-color: #a8c8a8; }\n.level-row.row-empty { opacity: .45; }\n\n.cell { padding: 7px 8px; display: flex; align-items: center; }\n.cell-lvl {\n  font-family: 'DM Serif Display', serif; font-size: 1.05rem; color: #5a4e3c;\n  border-right: 1px solid #e8e0d0; justify-content: center;\n  flex-direction: column; gap: 1px;\n}\n.cell-lvl.you-lvl { color: #2a6a2a; }\n.you-tag { font-size: 7px; text-transform: uppercase; letter-spacing: .08em; color: #2a6a2a; }\n.cell-new { font-size: 12px; color: #8b1a1a; font-weight: 600; border-right: 1px solid #e8e0d0; justify-content: center; }\n.cell-new-zero { color: #c8c0b0; font-weight: 400; }\n.cell-cum { font-size: 11px; color: #5a4e3c; border-right: 1px solid #e8e0d0; justify-content: center; flex-direction: column; align-items: center; gap: 1px; }\n.cell-pct { font-size: 11px; color: #5a4e3c; border-right: 1px solid #e8e0d0; }\n.cell-bar-kj { flex: 1; padding: 6px 10px; display: flex; flex-direction: column; gap: 4px; }\n\n.bar-track { background: #e0d8c8; border-radius: 2px; height: 6px; width: 100%; overflow: hidden; }\n.bar-fill { height: 100%; border-radius: 2px; }\n\n.kj-chips { display: flex; flex-wrap: wrap; gap: 3px; }\n.kj-chip {\n  width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;\n  font-family: 'Noto Serif JP', serif; font-size: 14px;\n  border-radius: 3px; flex-shrink: 0;\n}\n.chip-pleasant { background: #e8f4f8; border: 1px solid #b8d8e8; color: #1a4a6b; }\n.chip-painful  { background: #fdf3e0; border: 1px solid #e8d88b; color: #7a5a00; }\n.chip-death    { background: #f5e8e8; border: 1px solid #e8c5c5; color: #8b1a1a; }\n.chip-hell     { background: #ede8d8; border: 1px solid #c8b890; color: #5a4020; }\n.chip-paradise { background: #e8ede8; border: 1px solid #b0c8b0; color: #2a5a2a; }\n.chip-reality  { background: #ece8f0; border: 1px solid #c0b0d0; color: #3a1a5a; }\n\n.legend { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 1.25rem; }\n.legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #5a4e3c; }\n.legend-swatch { width: 14px; height: 14px; border-radius: 2px; flex-shrink: 0; }\n\n.insight-box {\n  background: #ede8d8; border: 1px solid #d8ccb4; border-radius: 4px;\n  padding: 1rem 1.25rem; margin-bottom: 1.5rem;\n}\n.insight-title { font-family: 'DM Serif Display', serif; font-size: 1.05rem; color: #1a1209; margin-bottom: .6rem; }\n.insight-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 8px; }\n.insight-item { font-size: 12px; color: #5a4e3c; line-height: 1.7; padding: 8px 10px; background: #F7F3E8; border: 1px solid #d8ccb4; border-radius: 3px; }\n.insight-item strong { color: #8b1a1a; display: block; font-size: 10px; text-transform: uppercase; letter-spacing: .07em; margin-bottom: 2px; }\n\n@media (max-width: 600px) {\n  .level-row { grid-template-columns: 40px 30px 50px 58px 1fr; }\n  .kj-chip { width: 24px; height: 24px; font-size: 12px; }\n}\n\n  /* \u2500\u2500 Repeated inline style replacements \u2500\u2500 */\n  .cum-sub     { font-size: 9px; color: #9a8e7c; }\n  .cum-sub-dim { font-size: 9px; color: #b0a898; }\n  .cum-val-dim { color: #b0a898; }\n", body: "<div class=\"container\">\n\n<header>\n  <h1>WaniKani \u00d7 Quartet \u2014 Full Distribution<\/h1>\n  <div class=\"sub\">All 252 Quartet Vol. 1 kanji mapped across all 60 WaniKani levels &nbsp;\u00b7&nbsp; Your level: 9<\/div>\n<\/header>\n\n<!-- Summary cards -->\n<div class=\"cards\">\n  <div class=\"card\">\n    <div class=\"card-label\">Total Quartet kanji<\/div>\n    <div class=\"card-value\">252<\/div>\n    <div class=\"card-sub\">Lessons 1\u20136<\/div>\n  <\/div>\n  <div class=\"card\">\n    <div class=\"card-label\">Covered by WK L1\u20139<\/div>\n    <div class=\"card-value\">41<\/div>\n    <div class=\"card-sub\">16.3% \u2014 you're here<\/div>\n  <\/div>\n  <div class=\"card\">\n    <div class=\"card-label\">WK L1\u201320 covers<\/div>\n    <div class=\"card-value\">143<\/div>\n    <div class=\"card-sub\">56.7% of Quartet<\/div>\n  <\/div>\n  <div class=\"card\">\n    <div class=\"card-label\">WK L1\u201340 covers<\/div>\n    <div class=\"card-value\">242<\/div>\n    <div class=\"card-sub\">96.0% of Quartet<\/div>\n  <\/div>\n  <div class=\"card\">\n    <div class=\"card-label\">Full WK (L60) covers<\/div>\n    <div class=\"card-value\">252<\/div>\n    <div class=\"card-sub\">100% \u2014 all accounted for<\/div>\n  <\/div>\n  <div class=\"card\">\n    <div class=\"card-label\">Heaviest single level<\/div>\n    <div class=\"card-value\">L12<\/div>\n    <div class=\"card-sub\">17 new Quartet kanji<\/div>\n  <\/div>\n<\/div>\n\n<!-- Key insights -->\n<div class=\"insight-box\">\n  <div class=\"insight-title\">Key Findings<\/div>\n  <div class=\"insight-grid\">\n    <div class=\"insight-item\"><strong>Early returns slow<\/strong>WaniKani's early levels focus on basic radicals and simple kanji. Levels 1\u20139 yield only 41 of 252 Quartet kanji \u2014 the textbook skews intermediate from the start.<\/div>\n    <div class=\"insight-item\"><strong>Levels 10\u201325 are the sweet spot<\/strong>These 16 levels collectively deliver 143 new Quartet kanji \u2014 over half the entire list. L12 alone adds 17, and L22 adds 11. This is where WK and Quartet overlap most.<\/div>\n    <div class=\"insight-item\"><strong>Tail extends to L53<\/strong>The last Quartet kanji (\u5553, from the formal letter salutation \u62dd\u5553) appears at WK Level 53. But by L40, you'd already know 96% of the list.<\/div>\n    <div class=\"insight-item\"><strong>All 252 are in WaniKani<\/strong>Every single Quartet kanji appears somewhere in WaniKani's 60 levels \u2014 there are zero gaps. The question is purely one of when, not whether.<\/div>\n  <\/div>\n<\/div>\n\n<!-- Legend -->\n<div class=\"legend\">\n  <div class=\"legend-item\"><div class=\"legend-swatch\" style=\"background:#e8f4f8;border:1px solid #b8d8e8;\"><\/div>Pleasant (1\u201310)<\/div>\n  <div class=\"legend-item\"><div class=\"legend-swatch\" style=\"background:#fdf3e0;border:1px solid #e8d88b;\"><\/div>Painful (11\u201320)<\/div>\n  <div class=\"legend-item\"><div class=\"legend-swatch\" style=\"background:#f5e8e8;border:1px solid #e8c5c5;\"><\/div>Death (21\u201330)<\/div>\n  <div class=\"legend-item\"><div class=\"legend-swatch\" style=\"background:#ede8d8;border:1px solid #c8b890;\"><\/div>Hell (31\u201340)<\/div>\n  <div class=\"legend-item\"><div class=\"legend-swatch\" style=\"background:#e8ede8;border:1px solid #b0c8b0;\"><\/div>Paradise (41\u201350)<\/div>\n  <div class=\"legend-item\"><div class=\"legend-swatch\" style=\"background:#ece8f0;border:1px solid #c0b0d0;\"><\/div>Reality (51\u201360)<\/div>\n<\/div>\n\n<!-- Column headers -->\n<div style=\"display:grid;grid-template-columns:46px 36px 56px 70px 1fr;gap:0;padding:4px 0;margin-bottom:4px;\">\n  <div style=\"font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:#9a8e7c;padding:0 8px;\">Lvl<\/div>\n  <div style=\"font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:#9a8e7c;padding:0 8px;\">+New<\/div>\n  <div style=\"font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:#9a8e7c;padding:0 8px;text-align:center;\">Total<\/div>\n  <div style=\"font-size:9px;text-transform:uppercase;letter-spa const mr = document.createElement('tr');\n    mr.className = 'milestone-row m-n3';\n    mr.innerHTML = `<td colspan=\"10\">\u25b6 N3 crosses 80% \u2014 Level ${milestones.n3} covers 302/370 (81.6%)<\/td>`;\n    tbody.appendChild(mr);\n  }\n\n  const isYou = lvl === 9;\n  const tr = document.createElement('tr');\n  tr.className = `data-row${isYou ? ' you-row' : ''}`;\n  tr.innerHTML = `\n    <td class=\"lvl-cell${isYou?' you':''}\">${lvl}${isYou?'<br><span style=\"font-family:sans-serif;font-size:8px;color:#2a6a2a;letter-spacing:.05em;\">YOU<\/span>':''}<\/td>\n    <td>${newCell(n5n)}<\/td>\n    <td>${cumCell(n5c,80)}<\/td>\n    <td><div class=\"bar-wrap\">${bar(n5p,'#5a9bc0')}${pctCell(n5p,'#1a6b9b')}<\/div><\/td>\n    <td>${newCell(n4n)}<\/td>\n    <td>${cumCell(n4c,170)}<\/td>\n    <td><div class=\"bar-wrap\">${bar(n4p,'#c89a00')}${pctCell(n4p,'#7a5a00')}<\/div><\/td>\n    <td>${newCell(n3n)}<\/td>\n    <td>${cumCell(n3c,370)}<\/td>\n    <td><div class=\"bar-wrap\">${bar(n3p,'#c05a5a')}${pctCell(n3p,'#8b1a1a')}<\/div><\/td>\n  `;\n  tbody.appendChild(tr);\n});\n" }
];

function toDate([y,m,d]) { return new Date(y, m-1, d); }
function toggleTokenPopover() {
  const pop = document.getElementById('wk-popover');
  pop.classList.toggle('open');
  if (pop.classList.contains('open')) {
    document.getElementById('wk-input').value = localStorage.getItem(WK_TOKEN_KEY) || '';
    document.getElementById('wk-input').focus();
  }
}
document.addEventListener('click', e => {
  const pop = document.getElementById('wk-popover');
  const btn = document.getElementById('wk-token-btn');
  if (!pop.contains(e.target) && !btn.contains(e.target)) pop.classList.remove('open');
});
function saveToken() {
  const token = document.getElementById('wk-input').value.trim();
  if (!token) return;
  localStorage.setItem(WK_TOKEN_KEY, token);
  document.getElementById('wk-popover').classList.remove('open');
  fetchWKLevel(token);
}
function clearToken() {
  localStorage.removeItem(WK_TOKEN_KEY); localStorage.removeItem(WK_LEVEL_KEY);
  document.getElementById('wk-input').value = '';
  document.getElementById('wk-popover').classList.remove('open');
  setBadge(9, 'loading'); applyLevelToAllPanels(9);
}
async function fetchWKLevel(token) {
  document.getElementById('wk-badge').className = 'wk-level-badge loading';
  document.getElementById('wk-lvl-display').textContent = '…';
  try {
    const res = await fetch('https://api.wanikani.com/v2/user', { headers: { Authorization: 'Bearer ' + token } });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const level = data.data.level;
    localStorage.setItem(WK_LEVEL_KEY, level); currentLevel = level;
    setBadge(level, 'ok'); applyLevelToAllPanels(level);
  } catch(e) { console.error('WK API error:', e); setBadge('!', 'error'); }
}
function setBadge(level, state) {
  const badge = document.getElementById('wk-badge');
  badge.className = 'wk-level-badge' + (state === 'error' ? ' error' : '');
  document.getElementById('wk-lvl-display').textContent = 'L' + level;
  badge.title = state === 'error' ? 'Could not fetch level — check your token' : 'WaniKani Level ' + level;
}
function applyLevelToAllPanels(level) { shadows.forEach((s, i) => { if (s) applyLevelToPanel(s, i, level); }); }
function applyLevelToPanel(shadow, i, level) {
  if (i === 0) applyLevelToStudyPlan(shadow, level);
  if (i === 2) applyLevelToDistribution(shadow, level);
  if (i === 3) applyLevelToJLPT(shadow, level);
}
function applyLevelToStudyPlan(shadow, level) {
  shadow.querySelectorAll('*').forEach(el => {
    if (el.children.length === 0 && el.textContent.includes('WaniKani L') && el.textContent.includes('→ L30'))
      el.textContent = el.textContent.replace(/WaniKani L\d+/, 'WaniKani L' + level);
  });
  shadow.querySelectorAll('.tag-wk').forEach(el => {
    const text = el.childNodes[el.childNodes.length - 1];
    if (text && text.nodeType === 3) text.textContent = 'WK L' + level;
  });
  shadow.querySelectorAll('.tip').forEach(el => {
    if (el.textContent.includes('→ L30') && el.textContent.includes('leveling up'))
      el.innerHTML = el.innerHTML.replace(/L\d+ → L30 in/, 'L' + level + ' → L30 in');
  });
  shadow.querySelectorAll('.week-tasks li').forEach(li => {
    if (li.textContent.includes('daily reviews at L') && li.textContent.includes('level up to L'))
      li.textContent = li.textContent.replace(/at L\d+/, 'at L' + level).replace(/level up to L\d+/, 'level up to L' + (level + 1));
  });
}
function applyLevelToDistribution(shadow, level) {
  shadow.querySelectorAll('.level-row').forEach(row => {
    row.classList.remove('row-you');
    const lc = row.querySelector('.cell-lvl');
    if (!lc) return;
    lc.classList.remove('you-lvl');
    const yt = lc.querySelector('.you-tag');
    if (yt) yt.remove();
  });
  shadow.querySelectorAll('.level-row').forEach(row => {
    const lc = row.querySelector('.cell-lvl');
    if (!lc) return;
    const spans = lc.querySelectorAll('span');
    const n = spans.length > 0 ? parseInt(spans[0].textContent) : parseInt(lc.textContent);
    if (n === level) {
      row.classList.add('row-you'); lc.classList.add('you-lvl');
      const tag = document.createElement('span');
      tag.className = 'you-tag'; tag.textContent = '← you';
      lc.appendChild(tag);
    }
  });
  shadow.querySelectorAll('.sub').forEach(el => {
    if (el.textContent.includes('Your level:'))
      el.textContent = el.textContent.replace(/Your level: \d+/, 'Your level: ' + level);
  });
  const cum = QUARTET_CUM[level] || 0;
  const pct = (cum / 252 * 100).toFixed(1);
  shadow.querySelectorAll('.card').forEach(card => {
    const lbl = card.querySelector('.card-label');
    const val = card.querySelector('.card-value');
    const sub = card.querySelector('.card-sub');
    if (lbl && lbl.textContent.includes('Covered by WK')) {
      lbl.textContent = 'Covered by WK L1–' + level;
      if (val) val.textContent = cum;
      if (sub) sub.textContent = pct + "% — you're here";
    }
  });
}
function applyLevelToJLPT(shadow, level) {
  shadow.querySelectorAll('tr.you-row').forEach(tr => {
    tr.classList.remove('you-row');
    tr.querySelectorAll('td.lvl-cell').forEach(td => {
      td.classList.remove('you');
      const s = td.querySelector('span');
      if (s && s.textContent.includes('YOU')) s.remove();
    });
  });
  shadow.querySelectorAll('tr.data-row').forEach(tr => {
    const lc = tr.querySelector('td.lvl-cell');
    if (!lc) return;
    if (parseInt(lc.textContent) === level) {
      tr.classList.add('you-row'); lc.classList.add('you');
      const s = document.createElement('span');
      s.style.cssText = 'font-family:sans-serif;font-size:8px;color:#2a6a2a;letter-spacing:.05em;display:block;';
      s.textContent = 'YOU'; lc.appendChild(s);
    }
  });
  shadow.querySelectorAll('.sub').forEach(el => {
    if (el.textContent.includes('Your current level:'))
      el.textContent = el.textContent.replace(/Your current level: \d+/, 'Your current level: ' + level);
  });
  shadow.querySelectorAll('.legend-item').forEach(el => {
    if (el.textContent.includes('Your current level'))
      el.innerHTML = el.innerHTML.replace(/L\d+\)/, 'L' + level + ')');
  });
  shadow.querySelectorAll('.card').forEach(card => {
    const lbl = card.querySelector('.card-label');
    const val = card.querySelector('.card-value');
    if (lbl && lbl.textContent.includes('Your WK level') && val) val.textContent = level;
  });
}
function applyWeekHighlight(shadow) {
  const today = new Date(); today.setHours(0,0,0,0);
  let currentWeek = null;
  for (let i = 0; i < weekSchedule.length; i++) {
    const [wnum, startArr] = weekSchedule[i];
    const start = toDate(startArr);
    const end = i + 1 < weekSchedule.length ? toDate(weekSchedule[i+1][1]) : new Date(start.getTime() + 7 * 86400000);
    if (today >= start && today < end) { currentWeek = wnum; break; }
    if (i === 0 && today < start) { currentWeek = wnum; break; }
  }
  shadow.querySelectorAll('.week[data-week]').forEach(el => {
    const w = parseInt(el.dataset.week);
    if (w === currentWeek) {
      el.classList.add('is-current');
      // Scroll current week to near the top of the viewport, leaving a bit of
      // context above (the previous week's footer / phase boundary).
      setTimeout(() => {
        // el lives inside the shadow DOM, but the scrollable .panel lives in
        // the light DOM. parentElement does NOT cross shadow boundaries, so
        // we must start from shadow.host (the light-DOM container) and walk
        // up from there to find the scrollable ancestor.
        let scroller = shadow.host;
        while (scroller && scroller.scrollHeight <= scroller.clientHeight) {
          scroller = scroller.parentElement;
        }
        if (!scroller) return;
        // Compute the element's offset relative to the scrollable container.
        const top = el.getBoundingClientRect().top
                  - scroller.getBoundingClientRect().top
                  + scroller.scrollTop
                  - 90;
        scroller.scrollTo({ top, behavior: 'smooth' });
      }, 300);
    } else if (currentWeek !== null && w < currentWeek) {
      el.classList.add('is-past');
    }
  });
}
function initPanel(i) {
  if (ready[i]) return;
  ready[i] = true;
  const host = document.getElementById('h' + i);
  const loader = document.getElementById('l' + i);
  const { style, body, script } = docs[i];
  const shadow = host.attachShadow({ mode: 'open' });
  shadows[i] = shadow;
  const styleEl = document.createElement('style');
  styleEl.textContent = style;
  shadow.appendChild(styleEl);
  const wrap = document.createElement('div');
  wrap.className = 'doc-root';
  wrap.innerHTML = body;
  shadow.appendChild(wrap);
  if (script.trim()) {
    try {
      const shadowDoc = new Proxy(document, {
        get(t, p) {
          if (p === 'querySelector')    return s => shadow.querySelector(s);
          if (p === 'querySelectorAll') return s => shadow.querySelectorAll(s);
          if (p === 'getElementById')   return id => shadow.getElementById(id);
          const v = t[p]; return typeof v === 'function' ? v.bind(t) : v;
        }
      });
      new Function('document', script)(shadowDoc);
    } catch(e) { console.warn('panel', i, e); }
  }
  if (i === 0) applyWeekHighlight(shadow);
  applyLevelToPanel(shadow, i, currentLevel);
  loader.classList.add('done');
}
function show(i) {
  tabs.forEach((t, j) => t.classList.toggle('active', j === i));
  document.querySelectorAll('.panel').forEach((p, j) => p.classList.toggle('active', j === i));
  initPanel(i);
}
